<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 16 - CSS Variables</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #2c3e50;
      --color-accent: #e67e22;
      --spacing-unit: 8px;
      --radius: 8px;
      --bg: #ffffff;
      --text: #1a1a1a;
      --card-bg: #f4f4f4;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #f0f0f0;
      --card-bg: #2c2c2c;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: calc(var(--spacing-unit) * 3);
      transition: background 0.3s, color 0.3s;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: calc(var(--spacing-unit) * 2);
      margin-bottom: calc(var(--spacing-unit) * 2);
    }

    .btn {
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: calc(var(--spacing-unit) * 1.5) calc(var(--spacing-unit) * 3);
      cursor: pointer;
      font-size: 1rem;
    }

    .toggle-btn {
      background: var(--color-primary);
    }
  </style>
</head>
<body>

  <h1>Theming with CSS Variables</h1>

  <div class="card">
    <p>This card's background, text color, and spacing all come from CSS custom properties defined once on <code>:root</code>.</p>
  </div>

  <button class="btn toggle-btn" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">
    Toggle Dark Mode
  </button>

  <p style="margin-top: 16px;">
    Clicking the button swaps <code>data-theme</code> on &lt;html&gt;, which re-defines the
    <code>--bg</code>, <code>--text</code>, and <code>--card-bg</code> variables instantly — no
    class juggling on every element needed.
  </p>

</body>
</html>
